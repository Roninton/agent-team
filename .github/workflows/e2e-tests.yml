name: E2E 测试流水线

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨2点运行全量测试
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  e2e-tests:
    name: E2E 测试
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 安装依赖
      run: npm run install:all

    - name: 安装 Playwright 浏览器
      run: cd e2e && npm run install:browsers

    - name: 安装系统依赖
      run: npx playwright install-deps chromium

    - name: 运行 E2E 冒烟测试
      if: github.event_name == 'pull_request'
      run: npm run test:e2e:smoke
      env:
        CI: true
        BASE_URL: http://localhost:5173
        API_URL: http://localhost:3001/api

    - name: 运行全量 E2E 测试
      if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: npm run test:e2e
      env:
        CI: true
        BASE_URL: http://localhost:5173
        API_URL: http://localhost:3001/api

    - name: 上传测试报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 30

    - name: 上传测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: e2e/test-results/
        retention-days: 30

  notification:
    name: 测试结果通知
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    steps:
    - name: 发送失败通知
      if: ${{ needs.e2e-tests.result == 'failure' }}
      run: |
        echo "E2E 测试失败，请检查: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        # 这里可以配置飞书、企业微信、Slack等通知
