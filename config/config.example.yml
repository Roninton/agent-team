# ACP Platform 配置文件示例
# 将此文件复制为 ./config/config.yml 生效
# 优先级：环境变量 > config.yml > 默认值
#
# 配置文件搜索顺序：
#   1. 环境变量 ACP_CONFIG_FILE 指定的路径
#   2. /etc/acp-platform/config.yml (Linux 系统级)
#   3. ~/.config/acp-platform/config.yml (用户级)
#   4. ./config/config.yml (项目级，推荐)

server:
  # 服务监听端口
  port: 3001
  # 监听地址，0.0.0.0 表示允许外部访问
  host: 0.0.0.0
  # CORS 允许的源，生产环境建议设置为具体域名
  corsOrigin: "http://localhost:5173"

database:
  # SQLite 数据库文件路径
  path: ./data/db/acp.sqlite

log:
  # 日志文件目录
  path: ./data/logs
  # 日志级别：debug / info / warn / error
  level: info

agent:
  # 最大同时运行的代理数量
  maxInstances: 10
  # 代理进程的工作目录
  workDir: ./data/agents

# 高级配置
advanced:
  # 启动时自动创建缺失的目录
  autoCreateDirs: true
  # 是否在启动时打印完整配置（注意不要打印敏感信息）
  printConfigOnStartup: false
